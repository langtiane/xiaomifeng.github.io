<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凸透镜成像实验仿真</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0f1a;
            --bg-light: #121a2e;
            --fg: #e8edf5;
            --muted: #6b7a94;
            --accent: #00d4aa;
            --accent-glow: rgba(0, 212, 170, 0.3);
            --lens-color: rgba(100, 180, 255, 0.4);
            --object-color: #ff6b4a;
            --image-color: #4a9fff;
            --ray-color: #ffd93d;
            --screen-color: #2a3a5a;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .glass-panel {
            background: linear-gradient(135deg, rgba(18, 26, 46, 0.9), rgba(10, 15, 26, 0.95));
            border: 1px solid rgba(100, 140, 180, 0.2);
            backdrop-filter: blur(10px);
        }
        
        .control-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(90deg, var(--bg-light), var(--accent));
            outline: none;
            cursor: pointer;
        }
        
        .control-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 15px var(--accent-glow);
            transition: transform 0.2s;
        }
        
        .control-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        
        .toggle-btn {
            position: relative;
            width: 56px;
            height: 28px;
            background: var(--bg-light);
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.3s;
            border: 1px solid rgba(100, 140, 180, 0.3);
        }
        
        .toggle-btn.active {
            background: var(--accent);
        }
        
        .toggle-btn::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: var(--fg);
            border-radius: 50%;
            transition: transform 0.3s;
        }
        
        .toggle-btn.active::after {
            transform: translateX(28px);
        }
        
        .info-card {
            background: linear-gradient(135deg, rgba(0, 212, 170, 0.1), rgba(74, 159, 255, 0.1));
            border: 1px solid rgba(0, 212, 170, 0.3);
            border-radius: 12px;
        }
        
        .formula {
            font-family: 'Times New Roman', serif;
            font-style: italic;
            font-size: 1.1rem;
        }
        
        canvas {
            display: block;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .pulse-hint {
            animation: pulse 2s ease-in-out infinite;
        }
        
        /* 自定义弹窗样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: linear-gradient(135deg, rgba(18, 26, 46, 0.95), rgba(10, 15, 26, 0.98));
            border: 2px solid rgba(0, 212, 170, 0.5);
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 212, 170, 0.3);
        }
        
        .modal-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #ff4444;
        }
        
        .modal-text {
            font-size: 16px;
            line-height: 1.8;
            color: var(--fg);
            margin-bottom: 20px;
            text-align: left;
            white-space: pre-wrap;
        }
        
        .modal-button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 12px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .modal-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 212, 170, 0.5);
        }
        
        .modal-button:active {
            transform: scale(0.95);
        }
        
        /* 结算弹窗样式 */
        .result-modal {
            max-width: 600px;
        }
        
        .result-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--accent), #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .result-evaluation {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 25px;
            padding: 15px;
            border-radius: 10px;
            background: rgba(0, 212, 170, 0.1);
            border: 2px solid rgba(0, 212, 170, 0.3);
            text-align: center;
        }
        
        .result-stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 15px;
        }
        
        .stat-item {
            flex: 1;
            text-align: center;
            padding: 15px 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(100, 140, 180, 0.2);
        }
        
        .stat-label {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent);
        }
        
        .result-divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(100, 140, 180, 0.5), transparent);
            margin: 20px 0;
        }
        
        .result-answers {
            margin-bottom: 25px;
        }
        
        .answer-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--fg);
            text-align: center;
        }
        
        .answer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .answer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border-left: 3px solid var(--accent);
        }
        
        .answer-label {
            font-size: 14px;
            color: var(--muted);
        }
        
        .answer-value {
            font-size: 16px;
            font-weight: bold;
            color: var(--fg);
        }
        
        .result-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 10px;
        }
        
        .primary-button {
            background: var(--accent);
            color: var(--bg);
        }
        
        .secondary-button {
            background: rgba(107, 122, 148, 0.3);
            color: var(--fg);
            border: 1px solid rgba(107, 122, 148, 0.5);
        }
        
        .secondary-button:hover {
            background: rgba(107, 122, 148, 0.5);
            box-shadow: 0 0 20px rgba(107, 122, 148, 0.3);
        }
    </style>
</head>
<body class="p-4 md:p-6">
    <div class="max-w-7xl mx-auto">
        <!-- 标题 -->
        <header class="text-center mb-6">
            <h1 class="text-2xl md:text-3xl font-bold mb-2" style="color: var(--accent);">凸透镜成像竞速小游戏</h1>
            <p class="text-sm md:text-base" style="color: var(--muted);">拖动光源和光屏，快速准确地找到像的位置</p>
        </header>
        
        <!-- 主画布区域 -->
        <div class="glass-panel rounded-2xl p-4 mb-4 overflow-hidden">
            <canvas id="mainCanvas"></canvas>
        </div>
        
        <!-- 游戏模式控制 -->
        <div id="gameControl" class="glass-panel rounded-xl p-4 mb-4">
            <h3 class="font-bold mb-3">游戏模式</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <div class="text-sm mb-1" style="color: var(--muted);">用时</div>
                    <div id="gameTime" class="text-xl font-bold" style="color: var(--accent);">00:00</div>
                </div>
                <div>
                    <div class="text-sm mb-1" style="color: var(--muted);">状态</div>
                    <div id="gameStatus" class="text-xl font-bold" style="color: var(--fg);">请摆放光屏</div>
                </div>
            </div>
            
            <!-- 成像性质填空题 -->
            <div class="mt-4">
                <h4 class="font-medium mb-3">成像性质</h4>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm mb-1" style="color: var(--muted);">像的性质</label>
                        <select id="imageNature" class="w-full px-3 py-2 bg-bg-light border border-muted rounded-lg text-red-500">
                            <option value="">请选择</option>
                            <option value="real">实像</option>
                            <option value="virtual">虚像</option>
                            <option value="noImage">不成像</option>
                        </select>
                    </div>
                    <div id="imageDirectionContainer">
                        <label class="block text-sm mb-1" style="color: var(--muted);">像的方向</label>
                        <select id="imageDirection" class="w-full px-3 py-2 bg-bg-light border border-muted rounded-lg text-red-500">
                            <option value="">请选择</option>
                            <option value="upright">正立</option>
                            <option value="inverted">倒立</option>
                        </select>
                    </div>
                    <div id="imageOnScreenContainer">
                        <label class="block text-sm mb-1" style="color: var(--muted);">能否成在光屏上</label>
                        <select id="imageOnScreen" class="w-full px-3 py-2 bg-bg-light border border-muted rounded-lg text-red-500">
                            <option value="">请选择</option>
                            <option value="yes">能</option>
                            <option value="no">不能</option>
                        </select>
                    </div>
                    <div id="imageSizeContainer">
                        <label class="block text-sm mb-1" style="color: var(--muted);">像的大小</label>
                        <select id="imageSize" class="w-full px-3 py-2 bg-bg-light border border-muted rounded-lg text-red-500">
                            <option value="">请选择</option>
                            <option value="enlarged">放大</option>
                            <option value="same">等大</option>
                            <option value="reduced">缩小</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="mt-4 flex justify-center gap-4">
                <button id="gameHintBtn" class="px-6 py-2 bg-yellow-500 text-white font-bold rounded-lg hover:bg-opacity-80 transition-all">
                    提示
                </button>
                <button id="gameConfirmBtn" class="px-6 py-2 bg-accent text-bg font-bold rounded-lg hover:bg-opacity-80 transition-all">
                    确定提交
                </button>
                <button id="gameRestartBtn" class="px-6 py-2 bg-muted text-fg font-bold rounded-lg hover:bg-opacity-80 transition-all">
                    再来一局
                </button>
            </div>
        </div>
        
        <!-- 实时数据面板 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
            <div class="info-card p-3 text-center">
                <div class="text-xs mb-1" style="color: var(--muted);">物距</div>
                <div id="objectDist" class="text-xl font-bold" style="color: var(--object-color);">200 px</div>
            </div>
            <div class="info-card p-3 text-center">
                <div class="text-xs mb-1" style="color: var(--muted);">像距</div>
                <div id="imageDist" class="text-xl font-bold" style="color: var(--image-color);">200 px</div>
            </div>
            <div class="info-card p-3 text-center">
                <div class="text-xs mb-1" style="color: var(--muted);">放大率</div>
                <div id="magnification" class="text-xl font-bold" style="color: var(--accent);">1.0x</div>
            </div>
            <div class="info-card p-3 text-center">
                <div class="text-xs mb-1" style="color: var(--muted);">像的性质</div>
                <div id="imageType" class="text-sm font-bold" style="color: var(--fg);">倒立等大实像</div>
            </div>
        </div>
        
        <!-- 成像规律说明 -->
        <div class="glass-panel rounded-xl p-4">
            <h3 class="font-bold mb-3 flex items-center gap-2">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 16v-4M12 8h.01"/>
                </svg>
                凸透镜成像规律
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 text-sm">
                <div class="p-3 rounded-lg" style="background: rgba(255, 107, 74, 0.1); border-left: 3px solid var(--object-color);">
                    <strong>u > 2f</strong>：成倒立、缩小的实像
                </div>
                <div class="p-3 rounded-lg" style="background: rgba(255, 217, 61, 0.1); border-left: 3px solid var(--ray-color);">
                    <strong>u = 2f</strong>：成倒立、等大的实像
                </div>
                <div class="p-3 rounded-lg" style="background: rgba(0, 212, 170, 0.1); border-left: 3px solid var(--accent);">
                    <strong>f < u < 2f</strong>：成倒立、放大的实像
                </div>
                <div class="p-3 rounded-lg" style="background: rgba(74, 159, 255, 0.1); border-left: 3px solid var(--image-color);">
                    <strong>u = f</strong>：不成像（平行光）
                </div>
                <div class="p-3 rounded-lg" style="background: rgba(160, 120, 255, 0.1); border-left: 3px solid #a078ff;">
                    <strong>u < f</strong>：成正立、放大的虚像
                </div>
                <div class="p-3 rounded-lg" style="background: rgba(255, 255, 255, 0.05); border-left: 3px solid var(--muted);">
                    <span class="formula">1/u + 1/v = 1/f</span>
                </div>
            </div>
        </div>
        
        <!-- 图例 -->
        <div class="flex flex-wrap justify-center gap-6 mt-4 text-sm" style="color: var(--muted);">
            <div class="legend-item">
                <div class="legend-dot" style="background: var(--object-color);"></div>
                <span>物体/光源</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: var(--image-color);"></div>
                <span>像</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: var(--ray-color);"></div>
                <span>光线</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: var(--accent);"></div>
                <span>焦点</span>
            </div>
        </div>
        
        <!-- 操作提示 -->
        <div class="text-center mt-4 pulse-hint" style="color: var(--muted);">
            <span class="text-xs">提示：拖动橙色箭头（光源）或灰色光屏来改变位置</span>
        </div>
        
        <!-- 游戏开始弹窗 -->
        <div id="gameModal" class="modal-overlay" style="display: none;">
            <div class="modal-content">
                <div id="modalTitle" class="modal-title"></div>
                <div id="modalText" class="modal-text"></div>
                <button id="modalButton" class="modal-button">确定</button>
            </div>
        </div>
        
        <!-- 游戏结算弹窗 -->
        <div id="resultModal" class="modal-overlay" style="display: none;">
            <div class="modal-content result-modal">
                <div id="resultTitle" class="result-title"></div>
                <div id="resultEvaluation" class="result-evaluation"></div>
                
                <div class="result-stats">
                    <div class="stat-item">
                        <div class="stat-label">用时</div>
                        <div id="resultTime" class="stat-value"></div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">误差</div>
                        <div id="resultError" class="stat-value"></div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">正确率</div>
                        <div id="resultAccuracy" class="stat-value"></div>
                    </div>
                </div>
                
                <div class="result-divider"></div>
                
                <div class="result-answers">
                    <div class="answer-title">正确答案</div>
                    <div class="answer-grid">
                        <div class="answer-item">
                            <span class="answer-label">像的性质：</span>
                            <span id="resultNature" class="answer-value"></span>
                        </div>
                        <div class="answer-item">
                            <span class="answer-label">像的方向：</span>
                            <span id="resultDirection" class="answer-value"></span>
                        </div>
                        <div class="answer-item">
                            <span class="answer-label">能否成在光屏：</span>
                            <span id="resultOnScreen" class="answer-value"></span>
                        </div>
                        <div class="answer-item">
                            <span class="answer-label">像的大小：</span>
                            <span id="resultSize" class="answer-value"></span>
                        </div>
                    </div>
                </div>
                
                <div class="result-buttons">
                    <button id="resultButton" class="modal-button primary-button">再来一局</button>
                    <button id="restButton" class="modal-button secondary-button">休息一下</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============ 初始化配置 ============
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        
        // 颜色配置
        const COLORS = {
            bg: '#0a0f1a',
            bgLight: '#121a2e',
            fg: '#e8edf5',
            muted: '#6b7a94',
            accent: '#00d4aa',
            lens: 'rgba(100, 180, 255, 0.4)',
            lensBorder: 'rgba(100, 180, 255, 0.8)',
            object: '#ff6b4a',
            image: '#4a9fff',
            virtualImage: '#a078ff',
            ray: '#ffd93d',
            rayGlow: 'rgba(255, 217, 61, 0.3)',
            screen: '#3a4a6a',
            screenBorder: '#5a6a8a',
            ruler: '#4a5a7a',
            rulerText: '#8a9aba'
        };
        
        // 状态变量
        let canvasWidth = 0;
        let canvasHeight = 0;
        let centerX = 0;
        let centerY = 0;
        let focalLength = 100;
        let showRays = false; // 默认隐藏光路
        let showVirtual = false; // 默认隐藏虚像
        let showImage = false; // 控制像的显示/隐藏
        let showRay1 = false; // 控制第一条光路
        let showRay2 = false; // 控制第二条光路
        
        // 游戏模式相关变量
        let isGameMode = false; // 是否处于游戏模式
        let gameStartTime = 0; // 游戏开始时间
        let gameTime = 0; // 游戏用时
        let gameTimer = null; // 计时器
        let gameObjectX = 0; // 游戏模式下物体的位置
        let gameImageX = 0; // 游戏模式下像的位置
        let gameScreenX = 0; // 游戏模式下光屏的位置
        let gameMode = 'findImage'; // 游戏模式：findImage（找像）或 findObject（找物体）
        
        // 物体状态
        let objectX = 0;
        let objectHeight = 60;
        
        // 光屏状态
        let screenX = 0;
        
        // 拖拽状态
        let isDraggingObject = false;
        let isDraggingScreen = false;
        let dragOffsetX = 0;
        
        // 动画状态
        let animationTime = 0;
        
        // ============ 初始化画布 ============
        function initCanvas() {
            const container = canvas.parentElement;
            const rect = container.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            
            canvasWidth = rect.width - 32;
            canvasHeight = Math.min(450, window.innerHeight * 0.45);
            
            canvas.width = canvasWidth * dpr;
            canvas.height = canvasHeight * dpr;
            canvas.style.width = canvasWidth + 'px';
            canvas.style.height = canvasHeight + 'px';
            
            ctx.scale(dpr, dpr);
            
            centerX = canvasWidth / 2;
            centerY = canvasHeight / 2 + 20;
            
            // 初始化物体和光屏位置
            if (objectX === 0) {
                objectX = centerX - 200;
                screenX = centerX + 200;
            }
        }
        
        // ============ 绘制函数 ============
        
        // 绘制光具座（刻度尺）
        function drawOpticalBench() {
            const rulerY = centerY + 80;
            const rulerHeight = 30;
            
            // 尺身背景
            ctx.fillStyle = COLORS.bgLight;
            ctx.fillRect(20, rulerY - rulerHeight/2, canvasWidth - 40, rulerHeight);
            
            // 尺身边框
            ctx.strokeStyle = COLORS.ruler;
            ctx.lineWidth = 1;
            ctx.strokeRect(20, rulerY - rulerHeight/2, canvasWidth - 40, rulerHeight);
            
            // 刻度
            const startX = 40;
            const endX = canvasWidth - 40;
            const pixelsPerUnit = 20; // 每20像素一个刻度
            
            ctx.strokeStyle = COLORS.rulerText;
            ctx.fillStyle = COLORS.rulerText;
            ctx.font = '10px Noto Sans SC';
            ctx.textAlign = 'center';
            
            for (let x = startX; x <= endX; x += pixelsPerUnit) {
                const isMajor = (x - startX) % (pixelsPerUnit * 5) === 0;
                const tickHeight = isMajor ? 10 : 5;
                
                ctx.beginPath();
                ctx.moveTo(x, rulerY - tickHeight);
                ctx.lineTo(x, rulerY + tickHeight);
                ctx.lineWidth = isMajor ? 1.5 : 0.5;
                ctx.stroke();
                
                // 主刻度数字（相对于透镜位置）
                if (isMajor && Math.abs(x - centerX) > 30) {
                    const distance = Math.round((x - centerX) / pixelsPerUnit) * 20;
                    ctx.fillText(Math.abs(distance), x, rulerY + 20);
                }
            }
            
            // 透镜位置标记
            ctx.fillStyle = COLORS.accent;
            ctx.font = 'bold 12px Noto Sans SC';
            ctx.fillText('O', centerX, rulerY + 20);
        }
        
        // 绘制凸透镜
        function drawLens() {
            const lensHeight = 140;
            // 根据焦距计算透镜厚度：焦距越小，厚度越大
            const lensWidth = 40 - (focalLength - 40) * 0.15; // 焦距40时厚度40，焦距180时厚度19
            
            // 透镜光晕
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, lensHeight/2);
            gradient.addColorStop(0, 'rgba(100, 180, 255, 0.15)');
            gradient.addColorStop(1, 'rgba(100, 180, 255, 0)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.ellipse(centerX, centerY, lensWidth + 10, lensHeight/2 + 20, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // 透镜主体（双凸形状）
            ctx.beginPath();
            ctx.moveTo(centerX, centerY - lensHeight/2);
            ctx.quadraticCurveTo(centerX + lensWidth, centerY, centerX, centerY + lensHeight/2);
            ctx.quadraticCurveTo(centerX - lensWidth, centerY, centerX, centerY - lensHeight/2);
            ctx.closePath();
            
            const lensGradient = ctx.createLinearGradient(centerX - lensWidth, centerY, centerX + lensWidth, centerY);
            lensGradient.addColorStop(0, 'rgba(100, 180, 255, 0.2)');
            lensGradient.addColorStop(0.5, 'rgba(150, 200, 255, 0.5)');
            lensGradient.addColorStop(1, 'rgba(100, 180, 255, 0.2)');
            ctx.fillStyle = lensGradient;
            ctx.fill();
            
            ctx.strokeStyle = COLORS.lensBorder;
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 主光轴
            ctx.beginPath();
            ctx.setLineDash([5, 5]);
            ctx.moveTo(20, centerY);
            ctx.lineTo(canvasWidth - 20, centerY);
            ctx.strokeStyle = COLORS.muted;
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.setLineDash([]);
            
            // 焦点标记
            drawFocalPoint(centerX - focalLength, centerY, 'F');
            drawFocalPoint(centerX + focalLength, centerY, "F'");
            drawFocalPoint(centerX - 2 * focalLength, centerY, '2F');
            drawFocalPoint(centerX + 2 * focalLength, centerY, "2F'");
        }
        
        // 绘制焦点
        function drawFocalPoint(x, y, label) {
            if (x < 30 || x > canvasWidth - 30) return;
            
            // 焦点光晕
            const glow = ctx.createRadialGradient(x, y, 0, x, y, 15);
            glow.addColorStop(0, 'rgba(0, 212, 170, 0.4)');
            glow.addColorStop(1, 'rgba(0, 212, 170, 0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(x, y, 15, 0, Math.PI * 2);
            ctx.fill();
            
            // 焦点
            ctx.beginPath();
            ctx.arc(x, y, 5, 0, Math.PI * 2);
            ctx.fillStyle = COLORS.accent;
            ctx.fill();
            
            // 标签
            ctx.fillStyle = COLORS.accent;
            ctx.font = 'bold 12px Noto Sans SC';
            ctx.textAlign = 'center';
            ctx.fillText(label, x, y + 25);
        }
        
        // 绘制物体（箭头）
        function drawObject() {
            const x = objectX;
            const y = centerY;
            const height = objectHeight;
            const width = 12;
            
            // 箭头主体
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x, y - height);
            
            // 箭头头部
            ctx.lineTo(x - width, y - height + 15);
            ctx.moveTo(x, y - height);
            ctx.lineTo(x + width, y - height + 15);
            
            ctx.strokeStyle = COLORS.object;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.stroke();
            
            // 箭头底部
            ctx.beginPath();
            ctx.arc(x, y, 3, 0, Math.PI * 2);
            ctx.fillStyle = COLORS.object;
            ctx.fill();
            
            // 物体光晕
            const glow = ctx.createRadialGradient(x, y - height/2, 0, x, y - height/2, height);
            glow.addColorStop(0, 'rgba(255, 107, 74, 0.2)');
            glow.addColorStop(1, 'rgba(255, 107, 74, 0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(x, y - height/2, height, 0, Math.PI * 2);
            ctx.fill();
            
            // 标签
            ctx.fillStyle = COLORS.object;
            ctx.font = 'bold 14px Noto Sans SC';
            ctx.textAlign = 'center';
            ctx.fillText('物', x, y + 25);
        }
        
        // 绘制光屏
        function drawScreen() {
            // 在找物体模式下，不显示光屏
            if (gameMode === 'findObject') return;
            
            const x = screenX;
            const y = centerY;
            const height = 120;
            const width = 8;
            
            // 光屏主体
            ctx.fillStyle = COLORS.screen;
            ctx.fillRect(x - width/2, y - height/2, width, height);
            
            ctx.strokeStyle = COLORS.screenBorder;
            ctx.lineWidth = 2;
            ctx.strokeRect(x - width/2, y - height/2, width, height);
            
            // 光屏支架
            ctx.fillStyle = COLORS.muted;
            ctx.fillRect(x - 2, y + height/2, 4, 30);
            
            // 标签
            ctx.fillStyle = COLORS.fg;
            ctx.font = '12px Noto Sans SC';
            ctx.textAlign = 'center';
            ctx.fillText('光屏', x, y + height/2 + 45);
        }
        
        // 计算成像
        function calculateImage() {
            const u = centerX - objectX; // 物距（正值）
            
            if (u <= 0 || Math.abs(u - focalLength) < 1) {
                return { v: Infinity, m: Infinity, isReal: false, imageX: Infinity, imageHeight: 0 };
            }
            
            // 透镜公式: 1/u + 1/v = 1/f
            const v = (u * focalLength) / (u - focalLength);
            const m = -v / u; // 放大率（负号表示倒立）
            
            return {
                v: v,
                m: m,
                isReal: v > 0,
                imageX: centerX + v,
                imageHeight: objectHeight * Math.abs(m)
            };
        }
        
        // 绘制像
        function drawImage() {
            let image;
            let x, y, height, width, isReal;
            
            if (gameMode === 'findObject') {
                // 在找物体模式下，像的位置固定为gameImageX
                x = gameImageX;
                y = centerY;
                
                // 计算像的高度和虚实
                const tempObjectX = gameObjectX; // 使用正确的物体位置计算像的性质
                const u = centerX - tempObjectX;
                if (u <= 0 || Math.abs(u - focalLength) < 1) {
                    return;
                }
                const v = (u * focalLength) / (u - focalLength);
                const m = -v / u;
                isReal = v > 0;
                height = Math.min(objectHeight * Math.abs(m), 150);
                width = 12 * Math.abs(m);
            } else {
                // 其他模式下，根据当前物体位置计算像
                image = calculateImage();
                
                if (!isFinite(image.v) || !isFinite(image.imageX)) return;
                if (image.imageX < 30 || image.imageX > canvasWidth - 30) return;
                
                x = image.imageX;
                y = centerY;
                height = Math.min(image.imageHeight, 150);
                width = 12 * Math.abs(image.m);
                isReal = image.isReal;
            }
            
            // 在找物体模式下，始终显示像
            if (gameMode === 'findObject' || showImage) {
                if (isReal) {
                    // 实像（倒立）
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(x, y + height); // 向下（倒立）
                    ctx.lineTo(x - width, y + height - 15);
                    ctx.moveTo(x, y + height);
                    ctx.lineTo(x + width, y + height - 15);
                    
                    ctx.strokeStyle = COLORS.image;
                    ctx.lineWidth = 3;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                    
                    // 实像光晕
                    const glow = ctx.createRadialGradient(x, y + height/2, 0, x, y + height/2, height);
                    glow.addColorStop(0, 'rgba(74, 159, 255, 0.3)');
                    glow.addColorStop(1, 'rgba(74, 159, 255, 0)');
                    ctx.fillStyle = glow;
                    ctx.beginPath();
                    ctx.arc(x, y + height/2, height, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = COLORS.image;
                    ctx.font = 'bold 14px Noto Sans SC';
                    ctx.textAlign = 'center';
                    ctx.fillText('像', x, y - 15);
                } else {
                    // 虚像（正立）
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(x, y - height); // 向上（正立）
                    ctx.lineTo(x - width, y - height + 15);
                    ctx.moveTo(x, y - height);
                    ctx.lineTo(x + width, y - height + 15);
                    
                    ctx.strokeStyle = COLORS.virtualImage;
                    ctx.lineWidth = 3;
                    ctx.setLineDash([5, 5]);
                    ctx.lineCap = 'round';
                    ctx.stroke();
                    ctx.setLineDash([]);
                    
                    ctx.fillStyle = COLORS.virtualImage;
                    ctx.font = 'bold 14px Noto Sans SC';
                    ctx.textAlign = 'center';
                    ctx.fillText('虚像', x, y - height - 15);
                }
            }
        }
        
        // 绘制光路
        function drawRays() {
            if (!showRays && !showRay1 && !showRay2) return;
            
            const image = calculateImage();
            const objX = objectX;
            const objTopY = centerY - objectHeight;
            
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            
            // 光线动画偏移
            const dashOffset = animationTime * 50;
            
            // 光线1：平行于主光轴的光线，折射后过焦点
            if (showRay1 || (showRays && !showRay1 && !showRay2)) {
                ctx.beginPath();
                ctx.moveTo(objX, objTopY);
                ctx.lineTo(centerX, objTopY);
                ctx.strokeStyle = COLORS.ray;
                ctx.stroke();
                
                if (image.isReal && isFinite(image.imageX)) {
                    // 实像：光线过焦点
                    ctx.beginPath();
                    ctx.moveTo(centerX, objTopY);
                    ctx.lineTo(image.imageX, centerY + image.imageHeight);
                    ctx.stroke();
                } else if (isFinite(image.imageX)) {
                    // 虚像：光线反向延长过焦点
                    const focalX = centerX + focalLength;
                    const slope = (centerY - objTopY) / (focalX - centerX);
                    const endX = canvasWidth - 20;
                    const endY = objTopY + slope * (endX - centerX);
                    
                    // 始终绘制实际光线
                    ctx.beginPath();
                    ctx.moveTo(centerX, objTopY);
                    ctx.lineTo(endX, endY);
                    ctx.stroke();
                    
                    // 虚线延长只在showVirtual为true时绘制
                    if (showVirtual) {
                        ctx.beginPath();
                        ctx.setLineDash([5, 5]);
                        ctx.moveTo(centerX, objTopY);
                        ctx.lineTo(image.imageX, centerY - image.imageHeight);
                        ctx.strokeStyle = COLORS.virtualImage;
                        ctx.stroke();
                        ctx.setLineDash([]);
                        ctx.strokeStyle = COLORS.ray;
                    }
                }
            }
            
            // 光线2：过光心的光线，不改变方向
            if (showRay2 || (showRays && !showRay1 && !showRay2)) {
                ctx.beginPath();
                ctx.moveTo(objX, objTopY);
                if (image.isReal && isFinite(image.imageX)) {
                    ctx.lineTo(image.imageX, centerY + image.imageHeight);
                } else {
                    // 绘制实际光线到画布边缘
                    ctx.lineTo(canvasWidth - 20, centerY + (centerY - objTopY) / (centerX - objX) * (canvasWidth - 20 - centerX));
                }
                ctx.strokeStyle = COLORS.ray;
                ctx.stroke();
                
                // 当形成虚像且showVirtual为true时，绘制虚线延长到虚像
                if (!image.isReal && showVirtual && isFinite(image.imageX)) {
                    ctx.beginPath();
                    ctx.setLineDash([5, 5]);
                    ctx.moveTo(centerX, centerY);
                    ctx.lineTo(image.imageX, centerY - image.imageHeight);
                    ctx.strokeStyle = COLORS.virtualImage;
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.strokeStyle = COLORS.ray;
                }
            }
        }
        
        // 绘制拖拽提示
        function drawDragHints() {
            // 物体拖拽区域提示
            if (!isDraggingObject && !isDraggingScreen) {
                if (gameMode === 'findObject') {
                    // 在找物体模式下，提示拖拽物体
                    ctx.fillStyle = 'rgba(255, 107, 74, 0.1)';
                    ctx.beginPath();
                    ctx.arc(objectX, centerY - objectHeight/2, 30, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // 在找像模式下，提示拖拽光屏
                    ctx.fillStyle = 'rgba(58, 74, 106, 0.1)';
                    ctx.beginPath();
                    ctx.arc(screenX, centerY, 30, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }
        
        // 游戏模式相关函数
        function startGameMode() {
            // 显示游戏目标弹窗
            const gameModeText = Math.random() > 0.5 ? 'findImage' : 'findObject';
            
            let modalTitle = '';
            let modalText = '';
            
            if (gameModeText === 'findImage') {
                modalTitle = '游戏目标：成像在哪里？';
                modalText = '1.光源位置已固定，移动光屏，确定像的位置\n' +
                           '2.填写成像性质\n' +
                           '3.完成后点击"确定提交"\n\n' +
                           '速度越快，位置越准，得分越高！';
            } else {
                modalTitle = '游戏目标：光源在哪里？';
                modalText = '1.像的位置已固定，请摆放光源位置\n' +
                           '2.填写成像性质\n' +
                           '3.完成后点击"确定提交"\n\n' +
                           '速度越快，位置越准，得分越高！';
            }
            
            // 显示自定义弹窗
            document.getElementById('modalTitle').textContent = modalTitle;
            document.getElementById('modalText').textContent = modalText;
            document.getElementById('gameModal').style.display = 'flex';
            
            // 设置弹窗按钮点击事件
            document.getElementById('modalButton').onclick = function() {
                document.getElementById('gameModal').style.display = 'none';
                
                // 开始游戏
                startGame(gameModeText);
            };
        }
        
        function startGame(gameModeText) {
            // 隐藏像和光路
            showImage = false;
            showRays = false;
            showVirtual = false;
            showRay1 = false;
            showRay2 = false;
            
            // 重置填空题
            document.getElementById('imageNature').value = '';
            document.getElementById('imageDirection').value = '';
            document.getElementById('imageOnScreen').value = '';
            document.getElementById('imageSize').value = '';
            
            // 重置下拉菜单显示状态
            document.getElementById('imageDirectionContainer').style.display = 'block';
            document.getElementById('imageOnScreenContainer').style.display = 'block';
            document.getElementById('imageSizeContainer').style.display = 'block';
            
            // 设置游戏模式
            gameMode = gameModeText;
            
            if (gameMode === 'findImage') {
                // 模式1：告诉你物体位置，确定像的位置，光源不可移动
                // 随机生成物体位置，确保像的位置在光具座范围内
                let validPosition = false;
                let tempObjectX = 0;
                let tempImageX = 0;
                
                while (!validPosition) {
                    // 随机生成物体位置（在透镜左侧40-200像素处）
                    tempObjectX = centerX - (40 + Math.random() * 160);
                    objectX = tempObjectX;
                    
                    // 计算像的位置
                    const image = calculateImage();
                    tempImageX = image.imageX;
                    
                    // 检查像的位置是否在光具座范围内（30到canvasWidth-30之间）
                    if (isFinite(tempImageX) && tempImageX > 30 && tempImageX < canvasWidth - 30) {
                        validPosition = true;
                    }
                }
                
                // 设置有效的物体和像位置
                gameObjectX = tempObjectX;
                gameImageX = tempImageX;
                
                // 光屏初始位置在最右边
                gameScreenX = canvasWidth - 40;
                screenX = gameScreenX;
                
                // 更新游戏状态
                document.getElementById('gameStatus').textContent = '请摆放光屏确定像的位置';
                document.getElementById('gameStatus').style.color = COLORS.fg;
            } else {
                // 模式2：告诉你像的位置，确定物体的位置，像不可移动，光屏消失，光源回到最左侧
                // 随机生成像的位置，确保物体的位置在光具座范围内
                let validPosition = false;
                let tempObjectX = 0;
                let tempImageX = 0;
                
                while (!validPosition) {
                    // 随机生成像的位置（在光具座范围内）
                    tempImageX = 30 + Math.random() * (canvasWidth - 60);
                    
                    // 计算对应的物体位置
                    const v = tempImageX - centerX;
                    if (v === 0) continue;
                    
                    // 透镜公式: 1/u + 1/v = 1/f
                    // u = (f * v) / (v - f)
                    const u = (focalLength * v) / (v - focalLength);
                    
                    if (u > 0) { // 物距必须为正
                        tempObjectX = centerX - u;
                        
                        // 检查物体位置是否在光具座范围内（30到centerX-10之间）
                        if (tempObjectX > 30 && tempObjectX < centerX - 10) {
                            objectX = tempObjectX;
                            validPosition = true;
                        }
                    }
                }
                
                // 设置有效的物体和像位置
                gameObjectX = tempObjectX;
                gameImageX = tempImageX;
                
                // 光源回到最左侧
                objectX = 40;
                
                // 光屏初始位置（虽然在这种模式下不显示）
                gameScreenX = canvasWidth - 40;
                screenX = gameScreenX;
                
                // 更新游戏状态
                document.getElementById('gameStatus').textContent = '请摆放光源确定物体的位置';
                document.getElementById('gameStatus').style.color = COLORS.fg;
            }
            
            // 重置游戏状态
            gameStartTime = Date.now();
            gameTime = 0;
            
            // 启动计时器
            if (gameTimer) clearInterval(gameTimer);
            gameTimer = setInterval(updateGameTime, 1000);
        }
        
        function updateGameTime() {
            gameTime = Math.floor((Date.now() - gameStartTime) / 1000);
            const minutes = Math.floor(gameTime / 60).toString().padStart(2, '0');
            const seconds = (gameTime % 60).toString().padStart(2, '0');
            document.getElementById('gameTime').textContent = `${minutes}:${seconds}`;
        }
        
        function confirmGamePosition() {
            // 获取填空题答案
            const imageNature = document.getElementById('imageNature').value;
            const imageDirection = document.getElementById('imageDirection').value;
            const imageOnScreen = document.getElementById('imageOnScreen').value;
            const imageSize = document.getElementById('imageSize').value;
            
            // 检查是否填写了像的性质
            if (!imageNature) {
                alert('请选择像的性质！');
                return;
            }
            
            // 如果选择的不是不成像，检查其他选项是否填写
            if (imageNature !== 'noImage' && (!imageDirection || !imageOnScreen || !imageSize)) {
                alert('请完成所有成像性质填空题！');
                return;
            }
            
            // 计算误差
            let error;
            if (gameMode === 'findImage') {
                // 找像模式：误差是光屏位置与像位置的差
                error = Math.abs(screenX - gameImageX);
            } else {
                // 找物体模式：误差是物体位置与正确位置的差
                error = Math.abs(objectX - gameObjectX);
            }
            
            // 停止计时器
            if (gameTimer) {
                clearInterval(gameTimer);
                gameTimer = null;
            }
            
            // 显示像
            showImage = true;
            
            // 计算像的实际性质
            const image = calculateImage();
            let actualNature, actualDirection, actualOnScreen, actualSize;
            
            // 检查是否不成像（当物距等于焦距时）
            const u = centerX - objectX;
            if (Math.abs(u - focalLength) < 0.1) {
                actualNature = 'noImage';
                actualDirection = '';
                actualOnScreen = '';
                actualSize = '';
            } else {
                actualNature = image.isReal ? 'real' : 'virtual';
                actualDirection = image.isReal ? 'inverted' : 'upright';
                actualOnScreen = image.isReal ? 'yes' : 'no';
                
                actualSize = 'same';
                if (Math.abs(image.m) > 1.05) {
                    actualSize = 'enlarged';
                } else if (Math.abs(image.m) < 0.95) {
                    actualSize = 'reduced';
                }
            }
            
            // 验证填空题答案
            let correctAnswers = 0;
            if (imageNature === actualNature) correctAnswers++;
            
            // 如果不是不成像，验证其他选项
            if (actualNature !== 'noImage') {
                if (imageDirection === actualDirection) correctAnswers++;
                if (imageOnScreen === actualOnScreen) correctAnswers++;
                if (imageSize === actualSize) correctAnswers++;
            }
            
            // 生成评价
            let evaluation = '';
            let color = COLORS.accent;
            
            const totalQuestions = actualNature === 'noImage' ? 1 : 4;
            
            if (error < 5 && correctAnswers === totalQuestions) {
                evaluation = '优秀！你是光学大师！';
            } else if (error < 10 && correctAnswers >= Math.ceil(totalQuestions * 0.75)) {
                evaluation = '很好！接近正确位置。';
            } else if (error < 20 && correctAnswers >= Math.ceil(totalQuestions * 0.5)) {
                evaluation = '不错！还有进步空间。';
            } else if (error < 30 && correctAnswers >= Math.ceil(totalQuestions * 0.25)) {
                evaluation = '一般，再试一次吧。';
            } else {
                evaluation = '需要更多练习哦！';
                color = COLORS.object;
            }
            
            // 显示评价
            document.getElementById('gameStatus').textContent = evaluation;
            document.getElementById('gameStatus').style.color = color;
            
            // 在找物体模式下，提交答案后显示光源的正确位置
            if (gameMode === 'findObject') {
                objectX = gameObjectX;
            }
            
            // 显示详细信息
            let actualNatureText, actualDirectionText, actualOnScreenText, actualSizeText;
            
            if (actualNature === 'noImage') {
                actualNatureText = '不成像';
                actualDirectionText = '-';
                actualOnScreenText = '-';
                actualSizeText = '-';
            } else {
                actualNatureText = actualNature === 'real' ? '实像' : '虚像';
                actualDirectionText = actualDirection === 'upright' ? '正立' : '倒立';
                actualOnScreenText = actualOnScreen === 'yes' ? '能' : '不能';
                actualSizeText = {
                    'enlarged': '放大',
                    'same': '等大',
                    'reduced': '缩小'
                }[actualSize];
            }
            
            // 显示结算弹窗
            document.getElementById('resultTitle').textContent = '游戏结束';
            document.getElementById('resultEvaluation').textContent = evaluation;
            document.getElementById('resultEvaluation').style.color = color;
            document.getElementById('resultEvaluation').style.borderColor = color;
            document.getElementById('resultEvaluation').style.background = color + '20';
            
            // 设置统计数据
            const minutes = Math.floor(gameTime / 60);
            const seconds = gameTime % 60;
            document.getElementById('resultTime').textContent = minutes > 0 ? `${minutes}分${seconds}秒` : `${seconds}秒`;
            document.getElementById('resultError').textContent = error.toFixed(1) + 'px';
            document.getElementById('resultAccuracy').textContent = `${correctAnswers}/${totalQuestions}`;
            
            // 设置正确答案
            document.getElementById('resultNature').textContent = actualNatureText;
            document.getElementById('resultDirection').textContent = actualDirectionText;
            document.getElementById('resultOnScreen').textContent = actualOnScreenText;
            document.getElementById('resultSize').textContent = actualSizeText;
            
            // 显示结算弹窗
            document.getElementById('resultModal').style.display = 'flex';
            
            // 设置"再来一局"按钮点击事件
            document.getElementById('resultButton').onclick = function() {
                document.getElementById('resultModal').style.display = 'none';
                startGameMode();
            };
            
            // 设置"休息一下"按钮点击事件
            document.getElementById('restButton').onclick = function() {
                document.getElementById('resultModal').style.display = 'none';
            };
        }
        
        // 更新信息面板
        function updateInfoPanel() {
            const u = Math.round(centerX - objectX);
            const image = calculateImage();
            
            document.getElementById('objectDist').textContent = u + ' px';
            
            if (Math.abs(u - focalLength) < 5) {
                document.getElementById('imageDist').textContent = '∞';
                document.getElementById('magnification').textContent = '∞';
                document.getElementById('imageType').textContent = '不成像';
                document.getElementById('imageType').style.color = COLORS.ray;
            } else if (isFinite(image.v)) {
                document.getElementById('imageDist').textContent = Math.round(Math.abs(image.v)) + ' px';
                document.getElementById('magnification').textContent = Math.abs(image.m).toFixed(2) + 'x';
                
                let typeText = '';
                let typeColor = '';
                
                if (image.isReal) {
                    if (Math.abs(image.m) < 0.95) {
                        typeText = '倒立缩小实像';
                        typeColor = COLORS.object;
                    } else if (Math.abs(image.m) > 1.05) {
                        typeText = '倒立放大实像';
                        typeColor = COLORS.image;
                    } else {
                        typeText = '倒立等大实像';
                        typeColor = COLORS.accent;
                    }
                } else {
                    typeText = '正立放大虚像';
                    typeColor = '#a078ff';
                }
                
                document.getElementById('imageType').textContent = typeText;
                document.getElementById('imageType').style.color = typeColor;
            } else {
                document.getElementById('imageDist').textContent = '∞';
                document.getElementById('magnification').textContent = '∞';
                document.getElementById('imageType').textContent = '不成像';
                document.getElementById('imageType').style.color = COLORS.ray;
            }
        }
        
        // ============ 事件处理 ============
        
        // 鼠标事件
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const pos = {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
            
            // 检查是否点击了物体
            if (Math.abs(pos.x - objectX) < 30 && Math.abs(pos.y - (centerY - objectHeight/2)) < 30) {
                // 在找像模式下，物体不可移动
                if (gameMode === 'findImage') return;
                
                isDraggingObject = true;
                dragOffsetX = pos.x - objectX;
            }
            
            // 检查是否点击了光屏
            if (Math.abs(pos.x - screenX) < 20 && Math.abs(pos.y - centerY) < 60) {
                // 在找物体模式下，光屏不可移动（因为不显示）
                if (gameMode === 'findObject') return;
                
                isDraggingScreen = true;
                dragOffsetX = pos.x - screenX;
            }
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (!isDraggingObject && !isDraggingScreen) return;
            
            const rect = canvas.getBoundingClientRect();
            const pos = {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
            
            if (isDraggingObject) {
                objectX = Math.max(40, Math.min(centerX - 20, pos.x - dragOffsetX));
            } else if (isDraggingScreen) {
                screenX = Math.max(40, Math.min(canvasWidth - 40, pos.x - dragOffsetX));
            }
        }, { passive: false });
        
        canvas.addEventListener('mouseup', () => {
            isDraggingObject = false;
            isDraggingScreen = false;
        });
        
        // 触摸事件
        canvas.addEventListener('touchstart', (e) => {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const pos = {
                x: touch.clientX - rect.left,
                y: touch.clientY - rect.top
            };
            
            // 检查是否点击了物体
            if (Math.abs(pos.x - objectX) < 30 && Math.abs(pos.y - (centerY - objectHeight/2)) < 30) {
                // 在找像模式下，物体不可移动
                if (gameMode === 'findImage') return;
                
                isDraggingObject = true;
                dragOffsetX = pos.x - objectX;
            }
            
            // 检查是否点击了光屏
            if (Math.abs(pos.x - screenX) < 20 && Math.abs(pos.y - centerY) < 60) {
                // 在找物体模式下，光屏不可移动（因为不显示）
                if (gameMode === 'findObject') return;
                
                isDraggingScreen = true;
                dragOffsetX = pos.x - screenX;
            }
        });
        
        canvas.addEventListener('touchmove', (e) => {
            if (!isDraggingObject && !isDraggingScreen) return;
            
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const pos = {
                x: touch.clientX - rect.left,
                y: touch.clientY - rect.top
            };
            
            if (isDraggingObject) {
                objectX = Math.max(40, Math.min(centerX - 20, pos.x - dragOffsetX));
            } else if (isDraggingScreen) {
                screenX = Math.max(40, Math.min(canvasWidth - 40, pos.x - dragOffsetX));
            }
        }, { passive: false });
        
        canvas.addEventListener('touchend', () => {
            isDraggingObject = false;
            isDraggingScreen = false;
        });
        
        // ============ 控件事件 ============
        
        document.getElementById('gameConfirmBtn').addEventListener('click', () => {
            confirmGamePosition();
        });
        
        document.getElementById('gameRestartBtn').addEventListener('click', () => {
            startGameMode();
        });
        
        // 提示按钮事件监听器
        document.getElementById('gameHintBtn').addEventListener('click', () => {
            // 显示光路1和2
            showRay1 = true;
            showRay2 = true;
            // 显示虚像光路（如果是虚像）
            const image = calculateImage();
            if (!image.isReal) {
                showVirtual = true;
            }
        });
        
        // 监听像的性质选择，当选择不成像时隐藏后面的选项
        document.getElementById('imageNature').addEventListener('change', function() {
            const imageDirectionContainer = document.getElementById('imageDirectionContainer');
            const imageOnScreenContainer = document.getElementById('imageOnScreenContainer');
            const imageSizeContainer = document.getElementById('imageSizeContainer');
            
            if (this.value === 'noImage') {
                imageDirectionContainer.style.display = 'none';
                imageOnScreenContainer.style.display = 'none';
                imageSizeContainer.style.display = 'none';
            } else {
                imageDirectionContainer.style.display = 'block';
                imageOnScreenContainer.style.display = 'block';
                imageSizeContainer.style.display = 'block';
            }
        });
        
        // ============ 初始化 ============
        
        window.addEventListener('resize', () => {
            initCanvas();
        });
        
        // 确保DOM加载完成后再初始化
        window.addEventListener('load', () => {
            initCanvas();
            startGameMode(); // 自动启动游戏模式
            draw();
        });
        
        // 主绘制循环
        function draw() {
            // 清空画布
            ctx.fillStyle = COLORS.bg;
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);
            
            // 绘制背景网格
            drawGrid();
            
            // 绘制各元素
            drawOpticalBench();
            drawRays();
            drawLens();
            drawObject();
            drawImage();
            drawScreen();
            drawDragHints();
            
            // 更新动画时间
            animationTime += 0.016;
            
            // 更新信息面板
            updateInfoPanel();
            
            requestAnimationFrame(draw);
        }
        
        // 绘制背景网格
        function drawGrid() {
            ctx.strokeStyle = 'rgba(100, 140, 180, 0.05)';
            ctx.lineWidth = 1;
            
            const gridSize = 40;
            
            for (let x = 0; x < canvasWidth; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvasHeight);
                ctx.stroke();
            }
            
            for (let y = 0; y < canvasHeight; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvasWidth, y);
                ctx.stroke();
            }
        }
    </script>
</body>
</html>
