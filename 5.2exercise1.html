<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平面镜成像 - 交互式学件</title>
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0f1a;
            --bg-secondary: #111827;
            --accent-cyan: #00e5ff;
            --accent-orange: #ff6b35;
            --accent-violet: #a855f7;
            --text-primary: #f0f4f8;
            --text-muted: #94a3b8;
            --mirror-color: #38bdf8;
            --object-color: #ff6b35;
            --image-color: #a855f7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .title-font {
            font-family: 'Orbitron', sans-serif;
        }

        .canvas-container {
            position: relative;
            background: linear-gradient(135deg, #0d1321 0%, #1a1f35 50%, #0d1321 100%);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 
                0 0 60px rgba(0, 229, 255, 0.1),
                inset 0 0 100px rgba(0, 0, 0, 0.3);
        }

        .canvas-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 229, 255, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.03) 0%, transparent 40%);
            pointer-events: none;
        }

        #mainCanvas {
            display: block;
            cursor: default;
        }

        .info-panel {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .info-panel:hover {
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 0 4px 20px rgba(56, 189, 248, 0.1);
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        .legend-line {
            width: 24px;
            height: 3px;
            display: inline-block;
            margin-right: 8px;
            border-radius: 2px;
        }

        .control-btn {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.15), rgba(56, 189, 248, 0.05));
            border: 1px solid rgba(56, 189, 248, 0.3);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .control-btn:hover {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.25), rgba(56, 189, 248, 0.1));
            border-color: rgba(56, 229, 255, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.2);
        }

        .control-btn:active {
            transform: translateY(0);
        }

        .formula-box {
            background: rgba(0, 229, 255, 0.05);
            border-left: 3px solid var(--accent-cyan);
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
            font-family: 'Times New Roman', serif;
            font-style: italic;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            opacity: 0.1;
            background-image: 
                linear-gradient(rgba(56, 189, 248, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.3) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .tooltip {
            position: absolute;
            background: rgba(17, 24, 39, 0.95);
            border: 1px solid rgba(56, 189, 248, 0.4);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 100;
            white-space: nowrap;
        }

        .tooltip.visible {
            opacity: 1;
        }

        /* 导入按钮样式 */
        .import-btn-container {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 8px;
            z-index: 50;
        }

        .import-btn {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.2), rgba(168, 85, 247, 0.1));
            border: 1px solid rgba(168, 85, 247, 0.4);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .import-btn:hover {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.35), rgba(168, 85, 247, 0.2));
            border-color: rgba(168, 85, 247, 0.7);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.25);
        }

        .import-btn:active {
            transform: translateY(0);
        }

        .import-btn svg {
            width: 14px;
            height: 14px;
        }

        #fileInput {
            display: none;
        }

        /* 添加按钮样式 */
        .add-btn-container {
            position: absolute;
            top: 16px;
            left: 16px;
            display: flex;
            gap: 8px;
            z-index: 50;
        }

        .add-btn {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.2), rgba(56, 189, 248, 0.1));
            border: 1px solid rgba(56, 189, 248, 0.4);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .add-btn:hover {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.35), rgba(56, 189, 248, 0.2));
            border-color: rgba(56, 189, 248, 0.7);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.25);
        }

        .add-btn svg {
            width: 14px;
            height: 14px;
        }

        /* 颜色选择器 */
        .color-picker {
            display: flex;
            gap: 4px;
            margin-left: 8px;
            padding-left: 8px;
            border-left: 1px solid rgba(255, 255, 255, 0.2);
        }

        .color-option {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .color-option:hover {
            transform: scale(1.2);
        }

        .color-option.selected {
            border-color: white;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.5);
        }

        /* 右键菜单 */
        .context-menu {
            position: absolute;
            background: rgba(17, 24, 39, 0.95);
            border: 1px solid rgba(56, 189, 248, 0.4);
            border-radius: 6px;
            padding: 4px 0;
            z-index: 1000;
            display: none;
            min-width: 120px;
        }

        .context-menu-item {
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-primary);
            transition: background 0.2s ease;
        }

        .context-menu-item:hover {
            background: rgba(56, 189, 248, 0.2);
        }

        .context-menu-item.delete {
            color: #ef4444;
        }

        .context-menu-item.delete:hover {
            background: rgba(239, 68, 68, 0.2);
        }
    </style>
</head>

            <h1 class="title-font text-2xl md:text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-400 mb-2">

                    </div>
                    <input type="file" id="fileInput" accept=".png,.jpg,.jpeg,.gif,.webp,.bmp">

            <!-- Info Panel -->

                <!-- Principles -->

                    <div class="formula-box mb-3">
                        <p class="text-lg text-center">物距 u = 像距 v</p>
                    </div>

                </div>

                <!-- Real-time Data -->

                    <h3 class="text-sm font-semibold text-cyan-400 mb-3 uppercase tracking-wider">实时数据</h3>
                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between">
                            <span class="text-slate-400">物距：</span>
                            <span id="objectDistance" class="text-orange-400 font-mono">--</span>

                            <span id="objectHeight" class="text-orange-400 font-mono">--</span>

                            <span class="text-slate-400">镜面角度：</span>

                <div class="info-panel p-4">

                    <ul class="space-y-2 text-sm text-slate-400">

                            拖动箭头端点可调整大小
                        </li>
                        <li class="flex items-start">
                            <span class="text-cyan-400 mr-2">●</span>
                            拖动箭头中间可移动位置
                        </li>
                        <li class="flex items-start">
                            <span class="text-cyan-400 mr-2">●</span>
                            拖动镜面端点调整角度

                            <span class="text-cyan-400 mr-2">●</span>
                            拖动镜面中间移动位置

    <script>
        // ============ 初始化配置 ============
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('tooltip');
        const platformImportBtn = document.getElementById('platformImportBtn');
        const customImportBtn = document.getElementById('customImportBtn');
        const fileInput = document.getElementById('fileInput');
        const addArrowBtn = document.getElementById('addArrowBtn');
        const addMirrorBtn = document.getElementById('addMirrorBtn');
        const contextMenu = document.getElementById('contextMenu');
        const deleteItem = document.getElementById('deleteItem');
        const arrowColorPicker = document.getElementById('arrowColorPicker');

        // ============ 导入图片相关变量 ============
        let importedImages = []; // 存储导入的图片对象
        let platformImageIndex = 0; // 平台题库图片索引
        let draggingImage = null; // 当前正在拖动的图片
        let resizingImage = null; // 当前正在缩放的图片
        const PLATFORM_IMAGES = ['平面镜成像练习1.png', '平面镜成像练习2.png'];

        // 右键菜单状态
        let contextMenuTarget = null; // { type: 'image'|'arrow'|'mirror', index: number }
        let selectedArrowColor = '#ef4444'; // 默认红色

        // 响应式画布
        function resizeCanvas() {
            const container = canvas.parentElement;
            const rect = container.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            
            canvas.width = rect.width * dpr;
            canvas.height = 700 * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = '700px';
            
            ctx.scale(dpr, dpr);
        }

        // ============ 数据模型 ============
        // 物体箭头数组
        let arrows = [
            {
                baseX: 300,
                baseY: 400,
                tipX: 300,
                tipY: 200,
                color: '#ff6b35',
                handleRadius: 12,
                id: 0
            }
        ];
        let nextArrowId = 1;

        // 平面镜数组
        let mirrors = [
            {
                x1: 600,
                y1: 100,
                x2: 600,
                y2: 600,
                color: '#38bdf8',
                handleRadius: 10,
                width: 6,
                id: 0
            }
        ];
        let nextMirrorId = 1;

        let dragging = null; // { type: 'arrow'|'mirror', id: number, part: string }
        let dragOffset = { x: 0, y: 0 };

        // ============ 数学工具函数 ============
        function distance(x1, y1, x2, y2) {
            return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
        }

        function pointToLineDistance(px, py, x1, y1, x2, y2) {
            const A = px - x1;
            const B = py - y1;
            const C = x2 - x1;
            const D = y2 - y1;
            const dot = A * C + B * D;
            const lenSq = C * C + D * D;
            let param = -1;
            if (lenSq !== 0) param = dot / lenSq;
            let xx, yy;
            if (param < 0) { xx = x1; yy = y1; }
            else if (param > 1) { xx = x2; yy = y2; }
            else { xx = x1 + param * C; yy = y1 + param * D; }
            return { dist: distance(px, py, xx, yy), closestX: xx, closestY: yy, param };
        }

        // 计算点关于直线的对称点
        function reflectPoint(px, py, x1, y1, x2, y2) {
            const dx = x2 - x1;
            const dy = y2 - y1;
            const lenSq = dx * dx + dy * dy;
            if (lenSq === 0) return { x: px, y: py };
            
            const t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
            const projX = x1 + t * dx;
            const projY = y1 + t * dy;
            
            return {
                x: 2 * projX - px,
                y: 2 * projY - py
            };
        }

        // 计算点到线段的垂直投影点
        function projectPointOnLine(px, py, x1, y1, x2, y2) {
            const dx = x2 - x1;
            const dy = y2 - y1;
            const lenSq = dx * dx + dy * dy;
            if (lenSq === 0) return { x: x1, y: y1 };
            
            const t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
            return {
                x: x1 + t * dx,
                y: y1 + t * dy
            };
        }

        // ============ 导入图片功能 ============
        // 创建图片对象
        function createImageObject(img, x, y, width, height) {
            return {
                img: img,
                x: x,
                y: y,
                width: width,
                height: height,
                originalWidth: width,
                originalHeight: height,
                handleRadius: 8,
                opacity: 1
            };
        }

        // 加载图片
        function loadImage(src, isBase64 = false) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = reject;
                if (isBase64) {
                    img.src = src;
                } else {
                    img.src = src;
                }
            });
        }

        // 平台题库导入
        async function importPlatformImage() {
            const imageName = PLATFORM_IMAGES[platformImageIndex];
            try {
                const img = await loadImage(imageName);
                // 计算合适的初始大小和位置
                const canvasWidth = canvas.width / (window.devicePixelRatio || 1);
                const canvasHeight = canvas.height / (window.devicePixelRatio || 1);
                const maxWidth = canvasWidth * 0.6;
                const maxHeight = canvasHeight * 0.6;
                
                let width = img.width;
                let height = img.height;
                
                // 等比例缩放
                if (width > maxWidth || height > maxHeight) {
                    const scale = Math.min(maxWidth / width, maxHeight / height);
                    width *= scale;
                    height *= scale;
                }
                
                const x = (canvasWidth - width) / 2;
                const y = (canvasHeight - height) / 2;
                
                // 清除之前的平台题库图片（只保留自定义导入的图片）
                importedImages = importedImages.filter(imgObj => imgObj.isCustom);
                
                const imageObj = createImageObject(img, x, y, width, height);
                imageObj.isPlatform = true;
                importedImages.push(imageObj);
                
                // 更新索引
                platformImageIndex = (platformImageIndex + 1) % PLATFORM_IMAGES.length;
                
                draw();
            } catch (error) {
                alert('无法加载图片: ' + imageName + '\n请确保图片文件与程序在同一目录下。');
            }
        }

        // 自定义导入
        function importCustomImage(file) {
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const img = await loadImage(e.target.result, true);
                    const canvasWidth = canvas.width / (window.devicePixelRatio || 1);
                    const canvasHeight = canvas.height / (window.devicePixelRatio || 1);
                    const maxWidth = canvasWidth * 0.6;
                    const maxHeight = canvasHeight * 0.6;
                    
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > maxWidth || height > maxHeight) {
                        const scale = Math.min(maxWidth / width, maxHeight / height);
                        width *= scale;
                        height *= scale;
                    }
                    
                    const x = (canvasWidth - width) / 2;
                    const y = (canvasHeight - height) / 2;
                    
                    const imageObj = createImageObject(img, x, y, width, height);
                    imageObj.isCustom = true;
                    importedImages.push(imageObj);
                    
                    draw();
                } catch (error) {
                    alert('图片加载失败，请检查文件格式。');
                }
            };
            reader.readAsDataURL(file);
        }

        // 绘制导入的图片
        function drawImportedImages() {
            importedImages.forEach((imgObj, index) => {
                ctx.save();
                ctx.globalAlpha = imgObj.opacity;
                ctx.drawImage(imgObj.img, imgObj.x, imgObj.y, imgObj.width, imgObj.height);
                
                // 绘制边框和手柄（当鼠标悬停或拖动时）
                if (draggingImage === index || resizingImage === index || isMouseOverImage(index)) {
                    ctx.strokeStyle = 'rgba(168, 85, 247, 0.8)';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 3]);
                    ctx.strokeRect(imgObj.x, imgObj.y, imgObj.width, imgObj.height);
                    ctx.setLineDash([]);
                    
                    // 绘制缩放手柄（右下角）
                    drawHandle(
                        imgObj.x + imgObj.width,
                        imgObj.y + imgObj.height,
                        imgObj.handleRadius,
                        '#a855f7',
                        'rgba(168, 85, 247, 0.3)'
                    );
                }
                
                ctx.restore();
            });
        }

        // 检查鼠标是否在图片上
        function isMouseOverImage(index) {
            // 这个函数会在mousemove中更新
            return false;
        }

        // 检测是否点击了导入的图片
        function hitTestImportedImage(pos) {
            // 从后向前检测（后添加的在上面）
            for (let i = importedImages.length - 1; i >= 0; i--) {
                const imgObj = importedImages[i];
                
                // 检测缩放手柄
                const handleX = imgObj.x + imgObj.width;
                const handleY = imgObj.y + imgObj.height;
                if (distance(pos.x, pos.y, handleX, handleY) < imgObj.handleRadius + 5) {
                    return { type: 'resize', index: i };
                }
                
                // 检测图片区域
                if (pos.x >= imgObj.x && pos.x <= imgObj.x + imgObj.width &&
                    pos.y >= imgObj.y && pos.y <= imgObj.y + imgObj.height) {
                    return { type: 'drag', index: i };
                }
            }
            return null;
        }

        // ============ 绘制函数 ============
        function drawGrid() {
            ctx.strokeStyle = 'rgba(56, 189, 248, 0.08)';
            ctx.lineWidth = 1;
            
            const step = 50;
            const w = canvas.width / (window.devicePixelRatio || 1);
            const h = canvas.height / (window.devicePixelRatio || 1);
            
            for (let x = 0; x <= w; x += step) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, h);
                ctx.stroke();
            }
            for (let y = 0; y <= h; y += step) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(w, y);
                ctx.stroke();
            }
        }

        function drawArrowHead(x, y, angle, size, color, filled = true) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(-size, -size * 0.5);
            ctx.lineTo(-size * 0.6, 0);
            ctx.lineTo(-size, size * 0.5);
            ctx.closePath();
            
            if (filled) {
                ctx.fillStyle = color;
                ctx.fill();
            } else {
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            ctx.restore();
        }

        function drawArrowBody(x1, y1, x2, y2, color, lineWidth = 4, dashed = false) {
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.lineCap = 'round';
            
            if (dashed) {
                ctx.setLineDash([8, 6]);
            } else {
                ctx.setLineDash([]);
            }
            
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawArrow(ax, ay, bx, by, color, dashed = false, filled = true) {
            const angle = Math.atan2(by - ay, bx - ax);
            const headSize = 18;
            
            // 画箭杆
            drawArrowBody(ax, ay, bx, by, color, 4, dashed);
            
            // 画箭头
            drawArrowHead(bx, by, angle, headSize, color, filled);
        }

        function drawMirror(mirror) {
            // 镜面主体 - 渐变效果
            const gradient = ctx.createLinearGradient(mirror.x1, mirror.y1, mirror.x2, mirror.y2);
            gradient.addColorStop(0, '#0ea5e9');
            gradient.addColorStop(0.5, '#38bdf8');
            gradient.addColorStop(1, '#0ea5e9');

            ctx.beginPath();
            ctx.strokeStyle = gradient;
            ctx.lineWidth = mirror.width;
            ctx.lineCap = 'round';
            ctx.moveTo(mirror.x1, mirror.y1);
            ctx.lineTo(mirror.x2, mirror.y2);
            ctx.stroke();

            // 镜面阴影线（表示反射面）
            const dx = mirror.x2 - mirror.x1;
            const dy = mirror.y2 - mirror.y1;
            const len = Math.sqrt(dx * dx + dy * dy);
            const perpX = -dy / len;
            const perpY = dx / len;

            ctx.strokeStyle = 'rgba(56, 189, 248, 0.4)';
            ctx.lineWidth = 1;

            const numLines = Math.floor(len / 20);
            for (let i = 1; i < numLines; i++) {
                const t = i / numLines;
                const startX = mirror.x1 + dx * t;
                const startY = mirror.y1 + dy * t;

                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(startX + perpX * 15, startY + perpY * 15);
                ctx.stroke();
            }

            // 端点手柄
            drawHandle(mirror.x1, mirror.y1, mirror.handleRadius, '#0ea5e9', 'rgba(56, 189, 248, 0.3)');
            drawHandle(mirror.x2, mirror.y2, mirror.handleRadius, '#0ea5e9', 'rgba(56, 189, 248, 0.3)');
        }

        function drawAllMirrors() {
            mirrors.forEach(mirror => drawMirror(mirror));
        }

        function drawHandle(x, y, radius, strokeColor, fillColor) {
            // 外圈
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = fillColor;
            ctx.fill();
            ctx.strokeStyle = strokeColor;
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 内圈
            ctx.beginPath();
            ctx.arc(x, y, radius * 0.4, 0, Math.PI * 2);
            ctx.fillStyle = strokeColor;
            ctx.fill();
        }

        function drawObject(arrow, index) {
            // 物体箭头
            drawArrow(arrow.baseX, arrow.baseY, arrow.tipX, arrow.tipY, arrow.color, false, true);

            // 端点手柄
            const handleColor = arrow.color;
            const r = parseInt(arrow.color.slice(1, 3), 16);
            const g = parseInt(arrow.color.slice(3, 5), 16);
            const b = parseInt(arrow.color.slice(5, 7), 16);
            const fillColor = `rgba(${r}, ${g}, ${b}, 0.3)`;
            drawHandle(arrow.baseX, arrow.baseY, arrow.handleRadius, handleColor, fillColor);
            drawHandle(arrow.tipX, arrow.tipY, arrow.handleRadius, handleColor, fillColor);

            // 标签
            ctx.fillStyle = arrow.color;
            ctx.font = 'bold 14px "Noto Sans SC"';
            ctx.textAlign = 'center';
            const midX = (arrow.baseX + arrow.tipX) / 2;
            const midY = (arrow.baseY + arrow.tipY) / 2;
            ctx.fillText('物' + (index > 0 ? index + 1 : ''), midX - 25, midY);
        }

        function drawAllObjects() {
            arrows.forEach((arrow, index) => drawObject(arrow, index));
        }

        function drawImageForArrow(arrow, mirror, index) {
            // 计算虚像
            const reflectedTip = reflectPoint(arrow.tipX, arrow.tipY, mirror.x1, mirror.y1, mirror.x2, mirror.y2);
            const reflectedBase = reflectPoint(arrow.baseX, arrow.baseY, mirror.x1, mirror.y1, mirror.x2, mirror.y2);

            // 虚像箭头（虚线）- 使用箭头相同的颜色
            drawArrow(reflectedBase.x, reflectedBase.y, reflectedTip.x, reflectedTip.y, arrow.color, true, false);

            // 标签 - 使用箭头相同的颜色
            ctx.fillStyle = arrow.color;
            ctx.font = 'bold 14px "Noto Sans SC"';
            ctx.textAlign = 'center';
            const midX = (reflectedBase.x + reflectedTip.x) / 2;
            const midY = (reflectedBase.y + reflectedTip.y) / 2;
            ctx.fillText('像' + (index > 0 ? index + 1 : ''), midX + 25, midY);

            return { reflectedTip, reflectedBase };
        }

        function drawAllImages() {
            // 为每个箭头在每个镜面上生成虚像
            arrows.forEach((arrow, arrowIndex) => {
                mirrors.forEach(mirror => {
                    drawImageForArrow(arrow, mirror, arrowIndex);
                });
            });
        }

        function drawPerpendicularLines() {
            ctx.setLineDash([3, 3]);
            ctx.strokeStyle = 'rgba(148, 163, 184, 0.4)';
            ctx.lineWidth = 1;

            // 为每个箭头在每个镜面上画辅助线
            arrows.forEach(arrow => {
                mirrors.forEach(mirror => {
                    const reflectedTip = reflectPoint(arrow.tipX, arrow.tipY, mirror.x1, mirror.y1, mirror.x2, mirror.y2);
                    const reflectedBase = reflectPoint(arrow.baseX, arrow.baseY, mirror.x1, mirror.y1, mirror.x2, mirror.y2);

                    // 物体底端垂线
                    const projBase = projectPointOnLine(arrow.baseX, arrow.baseY, mirror.x1, mirror.y1, mirror.x2, mirror.y2);
                    ctx.beginPath();
                    ctx.moveTo(arrow.baseX, arrow.baseY);
                    ctx.lineTo(projBase.x, projBase.y);
                    ctx.lineTo(reflectedBase.x, reflectedBase.y);
                    ctx.stroke();

                    // 物体顶端垂线
                    const projTip = projectPointOnLine(arrow.tipX, arrow.tipY, mirror.x1, mirror.y1, mirror.x2, mirror.y2);
                    ctx.beginPath();
                    ctx.moveTo(arrow.tipX, arrow.tipY);
                    ctx.lineTo(projTip.x, projTip.y);
                    ctx.lineTo(reflectedTip.x, reflectedTip.y);
                    ctx.stroke();
                });
            });

            ctx.setLineDash([]);
        }

        function updateInfo() {
            if (arrows.length === 0 || mirrors.length === 0) {
                document.getElementById('objectDistance').textContent = '--';
                document.getElementById('imageDistance').textContent = '--';
                document.getElementById('objectHeight').textContent = '--';
                document.getElementById('imageHeight').textContent = '--';
                document.getElementById('mirrorAngle').textContent = '--';
                return;
            }

            // 显示第一个箭头在第一个镜面上的数据
            const arrow = arrows[0];
            const mirror = mirrors[0];

            const reflectedBase = reflectPoint(arrow.baseX, arrow.baseY, mirror.x1, mirror.y1, mirror.x2, mirror.y2);
            const reflectedTip = reflectPoint(arrow.tipX, arrow.tipY, mirror.x1, mirror.y1, mirror.x2, mirror.y2);

            // 计算物距和像距（到镜面的垂直距离）
            const projBase = projectPointOnLine(arrow.baseX, arrow.baseY, mirror.x1, mirror.y1, mirror.x2, mirror.y2);
            const objectDist = distance(arrow.baseX, arrow.baseY, projBase.x, projBase.y);
            const imageDist = distance(reflectedBase.x, reflectedBase.y, projBase.x, projBase.y);

            // 计算高度
            const objHeight = distance(arrow.baseX, arrow.baseY, arrow.tipX, arrow.tipY);
            const imgHeight = distance(reflectedBase.x, reflectedBase.y, reflectedTip.x, reflectedTip.y);

            // 计算镜面角度
            const angle = Math.atan2(mirror.y2 - mirror.y1, mirror.x2 - mirror.x1) * 180 / Math.PI;

            document.getElementById('objectDistance').textContent = objectDist.toFixed(1) + ' px';
            document.getElementById('imageDistance').textContent = imageDist.toFixed(1) + ' px';
            document.getElementById('objectHeight').textContent = objHeight.toFixed(1) + ' px';
            document.getElementById('imageHeight').textContent = imgHeight.toFixed(1) + ' px';
            document.getElementById('mirrorAngle').textContent = angle.toFixed(1) + '°';
        }

        function draw() {
            const w = canvas.width / (window.devicePixelRatio || 1);
            const h = canvas.height / (window.devicePixelRatio || 1);

            // 清空画布
            ctx.clearRect(0, 0, w, h);

            // 绘制网格
            drawGrid();

            // 绘制导入的图片（在最底层）
            drawImportedImages();

            // 绘制平面镜
            drawAllMirrors();

            // 绘制辅助线
            drawPerpendicularLines();

            // 绘制虚像
            drawAllImages();

            // 绘制物体（在最上层）
            drawAllObjects();

            // 更新信息面板
            updateInfo();
        }

        // ============ 交互逻辑 ============
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        function getTouchPos(e) {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            return {
                x: touch.clientX - rect.left,
                y: touch.clientY - rect.top
            };
        }

        function hitTest(pos) {
            const threshold = 15;

            // 从后向前检测箭头（后添加的在上面）
            for (let i = arrows.length - 1; i >= 0; i--) {
                const arrow = arrows[i];

                // 检测箭头端点
                if (distance(pos.x, pos.y, arrow.tipX, arrow.tipY) < arrow.handleRadius + 5) {
                    return { type: 'arrow', id: arrow.id, part: 'tip' };
                }
                if (distance(pos.x, pos.y, arrow.baseX, arrow.baseY) < arrow.handleRadius + 5) {
                    return { type: 'arrow', id: arrow.id, part: 'base' };
                }

                // 检测箭头中间
                const arrowMid = pointToLineDistance(pos.x, pos.y, arrow.baseX, arrow.baseY, arrow.tipX, arrow.tipY);
                if (arrowMid.dist < threshold && arrowMid.param > 0 && arrowMid.param < 1) {
                    return { type: 'arrow', id: arrow.id, part: 'body' };
                }
            }

            // 从后向前检测镜面
            for (let i = mirrors.length - 1; i >= 0; i--) {
                const mirror = mirrors[i];

                // 检测镜面端点
                if (distance(pos.x, pos.y, mirror.x1, mirror.y1) < mirror.handleRadius + 5) {
                    return { type: 'mirror', id: mirror.id, part: 'p1' };
                }
                if (distance(pos.x, pos.y, mirror.x2, mirror.y2) < mirror.handleRadius + 5) {
                    return { type: 'mirror', id: mirror.id, part: 'p2' };
                }

                // 检测镜面中间
                const mirrorMid = pointToLineDistance(pos.x, pos.y, mirror.x1, mirror.y1, mirror.x2, mirror.y2);
                if (mirrorMid.dist < threshold && mirrorMid.param > 0 && mirrorMid.param < 1) {
                    return { type: 'mirror', id: mirror.id, part: 'body' };
                }
            }

            return null;
        }

        function updateCursor(hit) {
            if (!hit) {
                canvas.style.cursor = 'default';
                return;
            }
            if (hit.type === 'arrow') {
                if (hit.part === 'body') {
                    canvas.style.cursor = 'move';
                } else {
                    canvas.style.cursor = 'grab';
                }
            } else if (hit.type === 'mirror') {
                if (hit.part === 'body') {
                    canvas.style.cursor = 'move';
                } else {
                    canvas.style.cursor = 'grab';
                }
            }
        }

        function showTooltip(pos, hit) {
            const texts = {
                'arrow-tip': '拖动调整箭头大小',
                'arrow-base': '拖动调整箭头大小',
                'arrow-body': '拖动移动箭头位置',
                'mirror-p1': '拖动调整镜面角度',
                'mirror-p2': '拖动调整镜面角度',
                'mirror-body': '拖动移动镜面位置'
            };

            let key = '';
            if (hit) {
                if (hit.type === 'arrow') {
                    key = 'arrow-' + hit.part;
                } else if (hit.type === 'mirror') {
                    key = 'mirror-' + hit.part;
                }
            }

            if (key && texts[key]) {
                tooltip.textContent = texts[key];
                tooltip.style.left = (pos.x + 15) + 'px';
                tooltip.style.top = (pos.y - 10) + 'px';
                tooltip.classList.add('visible');
            } else {
                tooltip.classList.remove('visible');
            }
        }

        function handleStart(pos) {
            // 首先检测导入的图片
            const importedHit = hitTestImportedImage(pos);
            if (importedHit) {
                if (importedHit.type === 'drag') {
                    draggingImage = importedHit.index;
                    const imgObj = importedImages[importedHit.index];
                    dragOffset.x = pos.x - imgObj.x;
                    dragOffset.y = pos.y - imgObj.y;
                } else if (importedHit.type === 'resize') {
                    resizingImage = importedHit.index;
                }
                return;
            }

            const hit = hitTest(pos);
            if (hit) {
                dragging = hit;
                updateCursor(hit);

                if (hit.type === 'arrow' && hit.part === 'body') {
                    const arrow = arrows.find(a => a.id === hit.id);
                    if (arrow) {
                        dragOffset.x = pos.x - arrow.baseX;
                        dragOffset.y = pos.y - arrow.baseY;
                    }
                } else if (hit.type === 'mirror' && hit.part === 'body') {
                    const mirror = mirrors.find(m => m.id === hit.id);
                    if (mirror) {
                        dragOffset.x = pos.x - mirror.x1;
                        dragOffset.y = pos.y - mirror.y1;
                    }
                }
            }
        }

        function handleMove(pos) {
            const w = canvas.width / (window.devicePixelRatio || 1);
            const h = canvas.height / (window.devicePixelRatio || 1);

            // 处理导入图片的拖动
            if (draggingImage !== null) {
                canvas.style.cursor = 'move';
                const imgObj = importedImages[draggingImage];
                imgObj.x = Math.max(0, Math.min(w - imgObj.width, pos.x - dragOffset.x));
                imgObj.y = Math.max(0, Math.min(h - imgObj.height, pos.y - dragOffset.y));
                draw();
                return;
            }

            // 处理导入图片的缩放
            if (resizingImage !== null) {
                canvas.style.cursor = 'nwse-resize';
                const imgObj = importedImages[resizingImage];
                const newWidth = Math.max(50, pos.x - imgObj.x);
                const newHeight = newWidth * (imgObj.originalHeight / imgObj.originalWidth);
                if (imgObj.y + newHeight <= h) {
                    imgObj.width = newWidth;
                    imgObj.height = newHeight;
                }
                draw();
                return;
            }

            if (dragging) {
                canvas.style.cursor = 'grabbing';

                if (dragging.type === 'arrow') {
                    const arrow = arrows.find(a => a.id === dragging.id);
                    if (!arrow) return;

                    switch (dragging.part) {
                        case 'tip':
                            arrow.tipX = Math.max(20, Math.min(w - 20, pos.x));
                            arrow.tipY = Math.max(20, Math.min(h - 20, pos.y));
                            break;
                        case 'base':
                            arrow.baseX = Math.max(20, Math.min(w - 20, pos.x));
                            arrow.baseY = Math.max(20, Math.min(h - 20, pos.y));
                            break;
                        case 'body':
                            const newBaseX = pos.x - dragOffset.x;
                            const newBaseY = pos.y - dragOffset.y;
                            const tipDx = arrow.tipX - arrow.baseX;
                            const tipDy = arrow.tipY - arrow.baseY;
                            arrow.baseX = Math.max(20, Math.min(w - 20, newBaseX));
                            arrow.baseY = Math.max(20, Math.min(h - 20, newBaseY));
                            arrow.tipX = arrow.baseX + tipDx;
                            arrow.tipY = arrow.baseY + tipDy;
                            break;
                    }
                } else if (dragging.type === 'mirror') {
                    const mirror = mirrors.find(m => m.id === dragging.id);
                    if (!mirror) return;

                    switch (dragging.part) {
                        case 'p1':
                            mirror.x1 = Math.max(20, Math.min(w - 20, pos.x));
                            mirror.y1 = Math.max(20, Math.min(h - 20, pos.y));
                            break;
                        case 'p2':
                            mirror.x2 = Math.max(20, Math.min(w - 20, pos.x));
                            mirror.y2 = Math.max(20, Math.min(h - 20, pos.y));
                            break;
                        case 'body':
                            const mdx = mirror.x2 - mirror.x1;
                            const mdy = mirror.y2 - mirror.y1;
                            const newMx1 = pos.x - dragOffset.x;
                            const newMy1 = pos.y - dragOffset.y;
                            mirror.x1 = Math.max(20, Math.min(w - 20, newMx1));
                            mirror.y1 = Math.max(20, Math.min(h - 20, newMy1));
                            mirror.x2 = mirror.x1 + mdx;
                            mirror.y2 = mirror.y1 + mdy;
                            break;
                    }
                }
                draw();
            } else {
                // 检测导入图片的悬停状态
                const importedHit = hitTestImportedImage(pos);
                if (importedHit) {
                    if (importedHit.type === 'resize') {
                        canvas.style.cursor = 'nwse-resize';
                        tooltip.textContent = '拖动缩放图片';
                        tooltip.style.left = (pos.x + 15) + 'px';
                        tooltip.style.top = (pos.y - 10) + 'px';
                        tooltip.classList.add('visible');
                    } else {
                        canvas.style.cursor = 'move';
                        tooltip.textContent = '拖动移动图片';
                        tooltip.style.left = (pos.x + 15) + 'px';
                        tooltip.style.top = (pos.y - 10) + 'px';
                        tooltip.classList.add('visible');
                    }
                    draw(); // 重绘以显示边框
                    return;
                }

                const hit = hitTest(pos);
                updateCursor(hit);
                showTooltip(pos, hit);
            }
        }

        function handleEnd() {
            dragging = null;
            draggingImage = null;
            resizingImage = null;
            canvas.style.cursor = 'default';
            tooltip.classList.remove('visible');
            draw(); // 重绘以清除边框
        }

        // 鼠标事件
        canvas.addEventListener('mousedown', (e) => {
            handleStart(getMousePos(e));
        });

        canvas.addEventListener('mousemove', (e) => {
            handleMove(getMousePos(e));
        });

        canvas.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('mouseleave', handleEnd);

        // 触摸事件
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleStart(getTouchPos(e));
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            handleMove(getTouchPos(e));
        });

        canvas.addEventListener('touchend', handleEnd);

        // 右键菜单功能
        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            const pos = getMousePos(e);

            // 检测点击的目标
            let target = null;

            // 检测导入的图片
            const importedHit = hitTestImportedImage(pos);
            if (importedHit) {
                target = { type: 'image', index: importedHit.index };
            } else {
                // 检测箭头和镜面
                const hit = hitTest(pos);
                if (hit) {
                    if (hit.type === 'arrow') {
                        const index = arrows.findIndex(a => a.id === hit.id);
                        if (index !== -1) target = { type: 'arrow', index: index };
                    } else if (hit.type === 'mirror') {
                        const index = mirrors.findIndex(m => m.id === hit.id);
                        if (index !== -1) target = { type: 'mirror', index: index };
                    }
                }
            }

            if (target) {
                contextMenuTarget = target;
                contextMenu.style.display = 'block';
                contextMenu.style.left = e.clientX + 'px';
                contextMenu.style.top = e.clientY + 'px';
            } else {
                contextMenu.style.display = 'none';
            }
        });

        // 点击其他地方关闭右键菜单
        document.addEventListener('click', (e) => {
            if (!contextMenu.contains(e.target)) {
                contextMenu.style.display = 'none';
            }
        });

        // 删除功能
        deleteItem.addEventListener('click', () => {
            if (!contextMenuTarget) return;

            switch (contextMenuTarget.type) {
                case 'image':
                    importedImages.splice(contextMenuTarget.index, 1);
                    break;
                case 'arrow':
                    arrows.splice(contextMenuTarget.index, 1);
                    break;
                case 'mirror':
                    mirrors.splice(contextMenuTarget.index, 1);
                    break;
            }

            contextMenu.style.display = 'none';
            contextMenuTarget = null;
            draw();
        });

        // 颜色选择器
        arrowColorPicker.querySelectorAll('.color-option').forEach(option => {
            option.addEventListener('click', (e) => {
                e.stopPropagation();
                arrowColorPicker.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
                option.classList.add('selected');
                selectedArrowColor = option.dataset.color;
            });
        });

        // 添加箭头按钮
        addArrowBtn.addEventListener('click', () => {
            const canvasWidth = canvas.width / (window.devicePixelRatio || 1);
            const canvasHeight = canvas.height / (window.devicePixelRatio || 1);

            const newArrow = {
                baseX: canvasWidth / 2 - 50,
                baseY: canvasHeight / 2 + 100,
                tipX: canvasWidth / 2 - 50,
                tipY: canvasHeight / 2 - 100,
                color: selectedArrowColor,
                handleRadius: 12,
                id: nextArrowId++
            };

            arrows.push(newArrow);
            draw();
        });

        // 添加镜面按钮
        addMirrorBtn.addEventListener('click', () => {
            const canvasWidth = canvas.width / (window.devicePixelRatio || 1);
            const canvasHeight = canvas.height / (window.devicePixelRatio || 1);

            const newMirror = {
                x1: canvasWidth / 2 + 100,
                y1: canvasHeight / 2 - 200,
                x2: canvasWidth / 2 + 100,
                y2: canvasHeight / 2 + 200,
                color: '#38bdf8',
                handleRadius: 10,
                width: 6,
                id: nextMirrorId++
            };

            mirrors.push(newMirror);
            draw();
        });

        // 导入按钮事件
        platformImportBtn.addEventListener('click', importPlatformImage);

        customImportBtn.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                importCustomImage(file);
            }
            // 重置input以便可以重复选择同一文件
            fileInput.value = '';
        });

        // 初始化
        window.addEventListener('resize', () => {
            resizeCanvas();
            draw();
        });

        resizeCanvas();
        draw();
    </script>
</body>
</html>
